<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>People Analytics - Carregando...</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: 'Outfit', sans-serif;
            color: #f8fafc;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease-in-out;
        }

        .spinner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }

        .title {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            background: -webkit-linear-gradient(45deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 300;
            color: #cbd5e1;
            margin-top: 10px;
            opacity: 0.8;
            animation: pulseText 2s infinite ease-in-out;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Particles effect bg */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: moveGlow 10s infinite alternate ease-in-out;
        }

        @keyframes moveGlow {
            0% { transform: translate(-50px, -50px); }
            100% { transform: translate(50px, 50px); }
        }

    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="loader-container">
        <div class="spinner"></div>
        <h1 class="title">PEOPLE ANALYTICS V2</h1>
        <div class="subtitle" id="status-text">Sincronizando com Google Drive...</div>
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const phrases = [
            "Baixando banco de dados mais recente...",
            "Processando folhas de ponto...",
            "Calculando KPI's e tendências...",
            "Construindo dashboard corporativo..."
        ];
        
        let phraseIndex = 0;
        setInterval(() => {
            phraseIndex = (phraseIndex + 1) % phrases.length;
            statusText.innerText = phrases[phraseIndex];
        }, 3000);

        function checkStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    if (data.ready) {
                        statusText.innerText = "Iniciando...";
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 500);
                    } else {
                        setTimeout(checkStatus, 500);
                    }
                })
                .catch(err => {
                    console.error("Erro ao checar status", err);
                    setTimeout(checkStatus, 1000);
                });
        }

        checkStatus();
    </script>
</body>
</html>
